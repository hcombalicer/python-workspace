name: Daily Exchange Rate Check

on:
  schedule:
    # Runs at 1:00 PM UTC (9:00 PM Manila)
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # This command looks for your requirements.txt file
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/exchange_rate/requirements.txt

      - name: Run Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python automation/exchange_rate/main.py test

      - name: Run Alert Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Pass your threshold here
        run: python automation/exchange_rate/main.py --threshold 58.0

name: Daily Automation

on:
  schedule:
    # Runs every 3 hours from 9 AM to 10 PM Manila Time (UTC+8)
    - cron: '0 1-14/3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Installs dependencies for both projects
        run: |
          python -m pip install --upgrade pip
          pip install -r automation/exchange_rate/requirements.txt
          pip install -r automation/task_notifier/requirements.txt

      - name: Run Exchange Rate Alert
        env:
          FXRATESAPI_KEY: ${{ secrets.FXRATESAPI_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Pass the threshold here
        run: python automation/exchange_rate/exchange_rate.py --threshold ${{ vars.EXCHANGE_RATE }}

      - name: Run Task Notifier
        # Runs the overdue tasks script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_TOKEN_JSON: ${{ secrets.NOTIFIER_GOOGLE_TOKEN_BASE64 }}
        run: python automation/task_notifier/notifier.py
